name: Triage Result Processor

# Post-run processor for the `triage` workflow. Downloads the triage artifacts,
# validates the `triage-output.json` payload against the TriageOutput shape,
# scans for accidental or prompt-injection-induced secret leakage (GitHub tokens,
# Anthropic keys, long base64 blocks), and posts a formatted triage comment back
# to the issue after validation passes.
#
# Triggers on every completion of the triage workflow. Validation or processing
# failures surface in the GitHub UI as a red check on the processor run. The
# staging artifact itself is left in place (deleting would need actions:write);
# the failure is the signal.
#
# Validator is `.github/bin/js/validate-triage-output.ts` (run via Node native type-stripping), no deps.

on:
  workflow_run:
    workflows: ["Shopware Issue Triage"]
    types: [completed]

permissions:
  actions: read       # list + download artifacts of the triggering run
  contents: read      # checkout the validator script
  issues: write       # post the validated triage result as an issue comment

concurrency:
  group: process-triage-result-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout validator only
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: .github/bin/js
          sparse-checkout-cone-mode: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Download triage staging artifact
        id: download
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('node:fs');
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.payload.workflow_run.id,
                per_page: 100,
              },
            );
            const match = artifacts.find(a => a.name === 'safe-outputs-upload-artifacts');
            if (!match) {
              core.notice('No safe-outputs-upload-artifacts found on the triage run — nothing to validate.');
              core.setOutput('found', 'false');
              return;
            }
            const dl = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: match.id,
              archive_format: 'zip',
            });
            fs.writeFileSync('artifact.zip', Buffer.from(dl.data));
            core.setOutput('found', 'true');

      - name: Unpack staging artifact
        if: steps.download.outputs.found == 'true'
        run: |
          mkdir -p artifact
          unzip -o artifact.zip -d artifact/
          echo "::group::Artifact contents"
          find artifact -type f
          echo "::endgroup::"

      - name: Locate triage-output.json
        if: steps.download.outputs.found == 'true'
        id: locate
        run: |
          set -o pipefail
          file=$(find artifact -type f -name 'triage-output.json' -print -quit)
          if [ -z "$file" ]; then
            echo "No triage-output.json inside staging — agent may have emitted no upload."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found at: $file"
            {
              echo "file=$file"
              echo "found=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Validate
        if: steps.locate.outputs.found == 'true'
        env:
          TRIAGE_OUTPUT_FILE: ${{ steps.locate.outputs.file }}
        run: node .github/bin/js/validate-triage-output.ts "${TRIAGE_OUTPUT_FILE}"

      - name: Download triage context artifact
        if: steps.locate.outputs.found == 'true'
        id: download_context
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('node:fs');
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.payload.workflow_run.id,
                per_page: 100,
              },
            );
            const match = artifacts.find(a => a.name === 'triage-context');
            if (!match) {
              core.setFailed('No triage-context artifact found on the triage run.');
              return;
            }
            const dl = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: match.id,
              archive_format: 'zip',
            });
            fs.writeFileSync('triage-context.zip', Buffer.from(dl.data));

      - name: Unpack triage context artifact
        if: steps.locate.outputs.found == 'true'
        run: |
          mkdir -p triage-context
          unzip -o triage-context.zip -d triage-context/
          echo "::group::Triage context artifact contents"
          find triage-context -type f
          echo "::endgroup::"

      - name: Locate triage-context.json
        if: steps.locate.outputs.found == 'true'
        id: locate_context
        run: |
          set -o pipefail
          file=$(find triage-context -type f -name 'triage-context.json' -print -quit)
          if [ -z "$file" ]; then
            echo "No triage-context.json inside triage-context artifact."
            exit 1
          fi

          echo "Found at: $file"
          {
            echo "file=$file"
            echo "found=true"
          } >> "$GITHUB_OUTPUT"

      - name: Comment triage result
        if: steps.locate.outputs.found == 'true' && steps.locate_context.outputs.found == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TRIAGE_OUTPUT_FILE: ${{ steps.locate.outputs.file }}
          TRIAGE_CONTEXT_FILE: ${{ steps.locate_context.outputs.file }}
        with:
          script: |
            const fs = require('node:fs');

            const rawTriage = fs.readFileSync(process.env.TRIAGE_OUTPUT_FILE, 'utf8').trim();
            const triage = JSON.parse(rawTriage);
            const triageContext = JSON.parse(fs.readFileSync(process.env.TRIAGE_CONTEXT_FILE, 'utf8'));
            const issueNumber = Number(triageContext.issue_number);
            const runId = Number(triageContext.run_id);

            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              throw new Error(`Invalid issue_number in triage-context.json: ${JSON.stringify(triageContext.issue_number)}`);
            }
            if (!Number.isInteger(runId) || runId <= 0) {
              throw new Error(`Invalid run_id in triage-context.json: ${JSON.stringify(triageContext.run_id)}`);
            }

            const html = (value) => String(value)
              .replaceAll('&', '&amp;')
              .replaceAll('<', '&lt;')
              .replaceAll('>', '&gt;');
            const inlineCode = (value) => `<code>${html(value)}</code>`;
            const arrayList = (values, empty = '_None_') => {
              if (!Array.isArray(values) || values.length === 0) return empty;
              return values.map((value) => `- ${inlineCode(value)}`).join('\n');
            };
            const linkedNumbers = (values, prefix = '#') => {
              if (!Array.isArray(values) || values.length === 0) return '_None_';
              return values.map((value) => `${prefix}${value}`).join(', ');
            };
            const labels = Array.isArray(triage.suggested_labels) && triage.suggested_labels.length > 0
              ? triage.suggested_labels.map(inlineCode).join(', ')
              : '_None_';
            const missingFields = Array.isArray(triage.missing_template_fields) && triage.missing_template_fields.length > 0
              ? triage.missing_template_fields.map(inlineCode).join(', ')
              : '_None_';
            const evidence = Array.isArray(triage.evidence_quotes) && triage.evidence_quotes.length > 0
              ? triage.evidence_quotes.map((quote) => `- ${inlineCode(quote)}`).join('\n')
              : '_None_';
            const duplicate = triage.duplicate_of === null ? '_None_' : `#${triage.duplicate_of}`;
            const confidence = typeof triage.confidence === 'number' ? triage.confidence.toFixed(2) : triage.confidence;
            const serverUrl = process.env.GITHUB_SERVER_URL || 'https://github.com';
            const runUrl = `${serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const backtickRuns = rawTriage.match(/`+/g) ?? [];
            const fence = '`'.repeat(Math.max(3, ...backtickRuns.map((run) => run.length + 1)));
            const marker = `<!-- shopware-ai-triage:${runId} -->`;
            const body = [
              marker,
              '## AI Triage Result',
              '',
              `Validated result from [triage run ${runId}](${runUrl}).`,
              '',
              '| Field | Value |',
              '|---|---|',
              `| Disposition | ${inlineCode(triage.disposition)} |`,
              `| Severity | ${inlineCode(triage.severity)} |`,
              `| Confidence | ${inlineCode(confidence)} |`,
              `| Suggested labels | ${labels} |`,
              `| Duplicate of | ${duplicate} |`,
              `| Change size | ${inlineCode(triage.change_size_estimate)} |`,
              `| Missing template fields | ${missingFields} |`,
              `| Related issues | ${linkedNumbers(triage.related_issues)} |`,
              `| Related PRs | ${linkedNumbers(triage.related_prs)} |`,
              '',
              '### Reasoning',
              '',
              html(triage.reasoning),
              '',
              '### Evidence',
              '',
              evidence,
              '',
              '<details>',
              '<summary>Affected paths</summary>',
              '',
              arrayList(triage.affected_paths),
              '',
              '</details>',
              '',
              '<details>',
              '<summary>Recent commits in area</summary>',
              '',
              arrayList(triage.recent_commits_in_area),
              '',
              '</details>',
              '',
              '<details>',
              '<summary>triage-output.json</summary>',
              '',
              `${fence}json`,
              rawTriage,
              fence,
              '',
              '</details>',
            ].join('\n');

            if (body.length > 65000) {
              throw new Error(`Rendered triage comment is too large (${body.length} characters).`);
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              },
            );
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }
