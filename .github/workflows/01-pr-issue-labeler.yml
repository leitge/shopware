name: Label Issues and PRs

on:
  pull_request:
  issues:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  label:
    runs-on: ubuntu-24.04
    if: github.event_name == 'issues' || github.event_name == 'pull_request'
    steps:
      - uses: srvaroa/labeler@bf262763a8a8e191f5847873aecc0f29df84f957 # v1.14.0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  cleanup-needs-triage:
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - shell: bash
        run: npm ci --prefix .github/bin/js/
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { cleanupNeedsTriage } = await import('${{ github.workspace }}/.github/bin/js/node_modules/@shopware-ag/gh-project-automation/dist/index.mjs')
            await cleanupNeedsTriage({github, core, context}, false)

  apply-team-label:
    runs-on: ubuntu-24.04
    if: github.event.act || github.event_name == 'issues'
    needs: label
    env:
      TEAM_LABEL: "customer-support"
      CUSTOM_USERS: ${{ vars.ADDITIONAL_CUSTOMER_SUPPORT_USERS }}
    permissions:
      id-token: write
      issues: write
    steps:
      - id: sts
        if: ${{ !github.event.act }}
        continue-on-error: true
        uses: shopware/octo-sts-action@main
        with:
          scope: shopware
          identity: ReadCollaborators
      - uses: tspascoal/get-user-teams-membership@b2546c5affc730fd8e3d8483ae9ad3621938c2f9 # v4.0.2
        id: actorTeams
        with:
          username: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.event.act && secrets.GITHUB_TOKEN || steps.sts.outputs.token }}
      - name: Check if user is in custom list
        id: customUserCheck
        run: |
          CUSTOM_USERS_ARRAY=(${CUSTOM_USERS//,/ })
          for user in "${CUSTOM_USERS_ARRAY[@]}"; do
            if [[ "$user" == "${{ github.actor }}" ]]; then
              echo "is_custom_user=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          echo "is_custom_user=false" >> $GITHUB_OUTPUT
      - name: debug
        if: runner.debug
        run: |
          echo "${{ github.actor }} is member of teams: ${{ steps.actorTeams.outputs.teams }}"
          echo "Is custom user: ${{ steps.customUserCheck.outputs.is_custom_user }}"
      - if: ${{ contains(steps.actorTeams.outputs.teams, 'customer-support') || steps.customUserCheck.outputs.is_custom_user == 'true' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const teamLabel = process.env.TEAM_LABEL;

            const response = await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: [teamLabel],
            });

            if (response.status !== 200) {
              throw new Error(`Failed to add label ${teamLabel} to issue #${issueNumber}`);
            }

  move-to-wip:
    runs-on: ubuntu-24.04
    if: github.event.action == 'reopened'
    permissions:
      id-token: write
      issues: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: sts
        continue-on-error: true
        uses: shopware/octo-sts-action@main
        with:
          scope: shopware
          identity: ManageProjects
      - shell: bash
        run: npm ci --prefix .github/bin/js/
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.sts.outputs.token }}
          script: |
            const { setStatusInProjects } = await import('${{ github.workspace }}/.github/bin/js/node_modules/@shopware-ag/gh-project-automation/dist/index.mjs')
            await setStatusInProjects({github, core, context}, { fromStatus: "Done", toStatus: "in progress" })

  mark-stale-issues:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    permissions:
      contents: read
      # TODO: Set to write when Dry Run gets disabled
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - shell: bash
        run: npm ci --prefix .github/bin/js/
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PROJECT_NUMBER: 27 # Framework Group
          DRY_RUN: true
        with:
          script: |
            const { markStaleIssues } = await import('${{ github.workspace }}/.github/bin/js/node_modules/@shopware-ag/gh-project-automation/dist/index.mjs')
            await markStaleIssues({github, core, context}, process.env.PROJECT_NUMBER, process.env.DRY_RUN)

  close-stale-issues:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: [mark-stale-issues]
    permissions:
      contents: read
      # TODO: Set to write when Dry Run gets disabled
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - shell: bash
        run: npm ci --prefix .github/bin/js/
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          DRY_RUN: true
        with:
          script: |
            const { closeStaleIssues } = await import('${{ github.workspace }}/.github/bin/js/node_modules/@shopware-ag/gh-project-automation/dist/index.mjs')
            await closeStaleIssues({github, core, context}, process.env.DRY_RUN)

  priority-sync:
    runs-on: ubuntu-24.04
    if: github.event_name == 'issues' && github.event.action == 'labeled' && startsWith(github.event.label.name, 'priority')
    needs: label
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: sts
        continue-on-error: true
        uses: shopware/octo-sts-action@main
        with:
          scope: shopware
          identity: ManageProjects
      - shell: bash
        run: npm ci --prefix .github/bin/js/
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.sts.outputs.token }}
          script: |
            const { syncPriorities } = await import('${{ github.workspace }}/.github/bin/js/node_modules/@shopware-ag/gh-project-automation/dist/index.mjs')
            await syncPriorities({github, core, context})

  sync-test-plan-sub-issue:
    runs-on: ubuntu-24.04
    if: >
      github.event_name == 'issues' &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'testing/test-plan') ||
        (github.event.action == 'unlabeled' && github.event.label.name == 'testing/test-plan') ||
        github.event.action == 'reopened'
      )
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - shell: bash
        run: npm ci --prefix .github/bin/js/
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { syncTestPlanSubIssue } = await import('${{ github.workspace }}/.github/bin/js/test-plan-sub-issue.mjs')
            await syncTestPlanSubIssue({ github, core, context })
