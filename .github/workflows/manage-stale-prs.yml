name: Manage stale pull requests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *" # Every day at 12:00 UTC

jobs:
  manage-stale-prs:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: sts
        if: ${{ !github.event.act }}
        continue-on-error: true
        uses: shopware/octo-sts-action@main
        with:
          scope: shopware
          identity: Reminder
      - shell: bash
        run: npm ci --prefix .github/bin/js/
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN_PRODUCT_NOTIFICATIONS }}
          STALE_PR_THRESHOLD_DAYS: ${{ vars.STALE_PR_THRESHOLD_DAYS }}
          STALE_PR_CLOSE: ${{ vars.STALE_PR_CLOSE }}
          EXCLUDED_REPOSITORIES: ${{ vars.STALE_PR_EXCLUDED_REPOSITORIES || '[]' }}
          DRY_RUN: ${{ vars.STALE_PR_DRY_RUN || 'true' }}
        with:
          github-token: ${{ github.event.act && secrets.GITHUB_TOKEN || steps.sts.outputs.token }}
          script: |
            const { manageOldPullRequests } = await import('${{ github.workspace }}/.github/bin/js/node_modules/@shopware-ag/gh-project-automation/dist/index.mjs')
            await manageOldPullRequests({github, core, context, fetch}, "shopware", parseInt(process.env.STALE_PR_THRESHOLD_DAYS), process.env.STALE_PR_CLOSE === "true", JSON.parse(process.env.EXCLUDED_REPOSITORIES))
