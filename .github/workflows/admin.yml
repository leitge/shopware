name: Admin checks and tests

on:
  pull_request:
  merge_group:
  workflow_dispatch:
  workflow_call:

env:
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
  COMPOSER_ROOT_VERSION: 6.7.9999999-dev

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup Shopware
        uses: shopware/setup-shopware@main
        with:
          install-admin: true
          shopware-version: ${{ github.ref }}
          shopware-repository: ${{ github.repository }}

      - name: Cache ESLint and Stylelint
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            src/Administration/Resources/app/administration/node_modules/.eslintcache
            src/Administration/Resources/app/administration/node_modules/.stylelintcache
          key: admin-lint-${{ runner.os }}-${{ hashFiles('src/Administration/Resources/app/administration/package-lock.json', 'src/Administration/Resources/app/administration/eslint.config.mjs', 'src/Administration/Resources/app/administration/.stylelintrc') }}

      - name: Lint
        working-directory: src/Administration/Resources/app/administration
        run: npm run lint
      - name: Lint types
        working-directory: src/Administration/Resources/app/administration
        run: npm run lint:types
      - name: Lint scss
        working-directory: src/Administration/Resources/app/administration
        run: npm run lint:scss
      - name: Format
        working-directory: src/Administration/Resources/app/administration
        run: npm run format

  admin:
    runs-on: ubuntu-24.04
    name: "Jest Admin (unit)"
    env:
      NODE_VERSION: 'lts/*'
      JEST_MAX_WORKERS: 100%

    steps:
      - name: Setup Shopware
        uses: shopware/setup-shopware@main
        with:
          shopware-version: ${{ github.ref }}
          shopware-repository: ${{ github.repository }}

      - name: Generate entity schema mock
        run: composer run framework:schema:dump

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # 4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/Administration/Resources/app/administration/package-lock.json

      - name: Install admin dependencies
        run: npm --prefix src/Administration/Resources/app/administration ci

      - name: Generate unit test setup artifacts
        run: npm --prefix src/Administration/Resources/app/administration run unit-setup

      - name: Run Jest Admin unit
        run: npm --prefix src/Administration/Resources/app/administration run unit -- --silent

      - name: Upload coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # 5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: build/artifacts/jest/cobertura-coverage.xml
          flags: jest-admin
          disable_search: true

  license-check:
    runs-on: ubuntu-24.04
    name: "License check"
    env:
      WHITELISTED_JS_PACKAGES: 'abab@2.0.1;administration;taffydb@2.6.2'
      NODE_VERSION: 'lts/*'  
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 4
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # 4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: install packages
        uses: ./.github/actions/npm-ci-retry
        with:
          working-directory: src/Storefront/Resources/app/storefront
      - name: Check license
        working-directory: src/Administration/Resources/app/administration
        run: |
          npx license-checker-rseidelsohn \
            --onlyAllow "$(tr \\n \; < ${{ github.workspace }}/.allowed-licenses)" \
            --excludePackages "${WHITELISTED_JS_PACKAGES}" \
            --excludePrivatePackages

  admin-check:
    if: always()
    needs:
    - lint
    - admin
    - license-check

    runs-on: Ubuntu-latest
    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
      with:
        # allowed-failures: docs, linters
        # allowed-skips: non-voting-flaky-job
        jobs: ${{ toJSON(needs) }}
