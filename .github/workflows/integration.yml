name: Integration tests

on:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      nightly:
        default: ""
  workflow_call:
    inputs:
      nightly:
        type: string
        default: ""

permissions:
    contents: read
    id-token: write

jobs:
  generate-acceptance-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 4
      - id: generate-matrix
        run: |
          MATRIX=$(php .github/bin/generate-acceptance-matrix.php "${{ inputs.nightly }}" "${{ contains(github.event.pull_request.labels.*.name, 'major-tests') }}")
          jq . <<<"$MATRIX"
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$MATRIX" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

  acceptance:
    runs-on: ubuntu-24.04
    needs: generate-acceptance-matrix
    strategy: ${{ fromJson(needs.generate-acceptance-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 4
      - uses: ./.github/actions/ats
        with:
          project: ${{ matrix.name }}
          php-version: ${{ matrix.php-version }}
          shard: ${{ matrix.shard }}
          shard-count: ${{ matrix.shard-count }}
          workers: 1
          major: ${{ matrix.major }}
          install: ${{ matrix.name != 'Install' && 'true' || 'false' }}
          extra-options: ${{ matrix.name != 'Install' && '' || '--trace=on' }}
          use-currents: ${{ inputs.nightly == 'true' && github.event_name == 'schedule' && matrix.no-currents != 'true' || '' }}
          currents-project-id: ${{ secrets.CURRENTS_PROJECT_ID }}
          currents-record-key: ${{ secrets.CURRENTS_RECORD_KEY }}
          playwright-role-arn: ${{ secrets.PLAYWRIGHT_TRACES_UPLOAD_ROLE_ARN }}
          playwright-traces-domain: ${{ vars.PLAYWRIGHT_TRACES_DOMAIN }}
          s3-bucket: shopware-ci-playwright-traces
          report-prefix: playwright-reports

  acceptance-status-check:
    runs-on: ubuntu-24.04
    needs: acceptance
    if: ${{ !cancelled() && inputs.nightly == 'true' }}
    permissions:
      actions: read
    steps:
      - name: Generate Slack Message
        id: generate-message
        env:
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Collect all jobs through pagination (GitHub API returns max 100 per page)
          JOBS=""
          PAGE=1

          while true; do
            RESPONSE=$(gh api "/repos/$REPO/actions/runs/$RUN_ID/jobs?per_page=100&page=$PAGE")

            # Append jobs from this page to the jobs
            if [ -z "$JOBS" ]; then
              JOBS=$(jq '.jobs' <<<"$RESPONSE")
            else
              PAGE_JOBS=$(jq '.jobs' <<<"$RESPONSE")
              JOBS=$(jq --argjson new "${PAGE_JOBS}" '. + $new' <<<"$JOBS")
            fi

            # Check if this was the last page by counting returned jobs
            JOBS_ON_PAGE=$(jq '.jobs | length' <<<"$RESPONSE")
            if [ "$JOBS_ON_PAGE" -lt 100 ]; then
              break
            fi

            PAGE=$((PAGE + 1))
          done

          # Extract only acceptance jobs (they have prefix "acceptance (")
          ACCEPTANCE_JOBS=$(jq -r '
              .[]
              | select(.name | contains("acceptance ("))
              | . as $job
              | ($job.name | capture("acceptance \\((?<name>[^,]+), (?:(?<major>major), )?(?<php>[^,]+), (?<shard>\\d+), (?<shardCount>\\d+), (?<currents>true|false)\\)")) as $parsed
              | {
                  id: $job.id,
                  name: $job.name,
                  conclusion: $job.conclusion,
                  sort: [
                    ($parsed.name == "Install"),          # Install last
                    ($parsed.major == "major"),           # non-major first
                    ($parsed.php),                        # PHP version
                    ($parsed.shard | tonumber),           # shard order
                    ($parsed.currents == "false")         # currents=false last
                  ]
                }
              | @json
              ' <<<"$JOBS" |
            jq -s -r 'sort_by(.sort)[] | "\(.id);\(.name);\(.conclusion)"')

          MESSAGE=""
          # Process each acceptance job
          while IFS=';' read -r JOB_ID JOB_NAME JOB_CONCLUSION; do
          case "$JOB_CONCLUSION" in
            success)
            MESSAGE="$MESSAGE✅ $JOB_NAME\n"
            ;;
            failure|cancelled)
            MESSAGE="$MESSAGE❌ $JOB_NAME ( https://github.com/$REPO/actions/runs/$RUN_ID/job/$JOB_ID )\n"
            ;;
            skipped|skipped*)
            MESSAGE="$MESSAGE⏭️ $JOB_NAME\n"
            ;;
            *)
            MESSAGE="$MESSAGE❓ $JOB_NAME ( https://github.com/$REPO/actions/runs/$RUN_ID/job/$JOB_ID )\n"
            ;;
          esac
          done<<<"$ACCEPTANCE_JOBS"

          echo "slack-msg=$MESSAGE" >>"$GITHUB_OUTPUT"
      - name: Post Slack message
        if: ${{ !cancelled() && inputs.nightly == 'true' }}
        env:
          MESSAGE: ${{ steps.generate-message.outputs.slack-msg }}
        run: |
          SLACK_PAYLOAD=$(jq --null-input --arg message "$(printf '%b' "$MESSAGE")" '{"message": $message}')
          curl --silent --request POST --url "${{ secrets.SLACK_ATS_WORKFLOW_URL }}" --header "Content-Type: application/json" --data "${SLACK_PAYLOAD}"

  acceptance-tests-changed:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0 # Fetch full history in order to see what's changed

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@8cba46e29c11878d930bca7870bb54394d3e8b21 # v46
        with:
          files: |
            tests/acceptance/tests/**/*.spec.ts

      - name: Execute acceptance tests
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        uses: ./.github/actions/ats
        #env:
        #  ATS_SKIP_CLEANUP: true
        with:
          project: "Platform"
          install: true
          extra-options: >-
            --repeat-each="10"
            -- ${{ format(' {0}', steps.changed-files.outputs.all_changed_files) }}
          artifact-prefix: "ats-changed"

  phpunit-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 4
      - id: generate-matrix
        run: |
          MATRIX=$(php .github/bin/generate-phpunit-matrix.php "${{ inputs.nightly }}")
          echo $MATRIX
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$MATRIX" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

  phpunit:
    name: "${{ matrix.php}} ${{ matrix.test.testsuite }}${{ matrix.test.path }} ${{ matrix.db }} ${{ matrix.opensearch != 'opensearchproject/opensearch:3' && matrix.opensearch || '' }}"
    needs:
      - phpunit-matrix
    runs-on: ubuntu-24.04
    strategy: ${{ fromJson(needs.phpunit-matrix.outputs.matrix) }}
    env:
      APP_ENV: test
      DATABASE_URL: mysql://root@127.0.0.1:3306/root
      REDIS_URL: redis://localhost:6379
      APP_URL: http://localhost:8000
      APP_SECRET: def00000bb5acb32b54ff8ee130270586eec0e878f7337dc7a837acc31d3ff00f93a56b595448b4b29664847dd51991b3314ff65aeeeb761a133b0ec0e070433bff08e48
      OPENSEARCH_URL: 127.0.0.1:9200
      ADMIN_OPENSEARCH_URL: 127.0.0.1:9200
      BLUE_GREEN_DEPLOYMENT: 1
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      COMPOSER_ROOT_VERSION: 6.7.9999999-dev

    services:
      elasticsearch:
        image: ${{ matrix.test.path != '' &&  matrix.opensearch || 'alpine' }}
        env:
          discovery.type: single-node
          plugins.security.disabled: "true"
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: "yourStrongPassword123!"
        ports:
          - "9200:9200"
      database:
        image: ${{ matrix.db }}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: shopware
        ports:
          - "3306:3306"
        options: --health-cmd="mysqladmin ping || mariadb-admin ping"
      redis:
        image: redis:alpine
        ports:
          - "6379:6379"
    steps:
      - name: Setup Shopware
        uses: shopware/setup-shopware@main
        with:
          php-version: ${{ matrix.php }}
          mysql-version: "skip"
          shopware-version: ${{ github.ref }}
          shopware-repository: ${{ github.repository }}

      - name: Wait for OpenSearch/Elasticsearch
        if: ${{ contains(matrix.test.path, 'Elasticsearch') }}
        run: |
            # Wait for OpenSearch/Elasticsearch to be alive
            max_tries=30
            tries=0
            until curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'; do
                if [ $tries -ge $max_tries ]; then
                    echo "Max tries waiting for OpenSearch/Elasticsearch to be ready exceeded."
                    exit 1
                fi

                echo "Waiting for OpenSearch/Elasticsearch to be ready..."
                sleep 2
                tries=$((tries + 1))
            done

      - name: Start Webserver
        run: symfony server:start -d

      - name: Install Shopware
        run: php src/Core/TestBootstrap.php

      - name: Run PHPUnit testsuite
        if: ${{ matrix.test.testsuite != '' }}
        run: php -d memory_limit=-1 vendor/bin/phpunit --log-junit junit.xml --testsuite "${{ matrix.test.testsuite }}"

      - name: Run PHPUnit path
        if: ${{ matrix.test.path != '' }}
        run: php -d memory_limit=-1 vendor/bin/phpunit --log-junit junit.xml -- tests/integration/${{ matrix.test.path }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # 1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}


  win-checkout:
    runs-on: windows-latest
    if: ${{ github.event_name != 'pull_request' }}
    name: "Windows check"

    steps:
      - name: Support longpaths
        run: git config --system core.longpaths true

      - name: Clone platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 4
  php-security:
    runs-on: ubuntu-24.04
    name: "Composer dependencies"
    env:
      COMPOSER_ROOT_VERSION: 6.7.9999999-dev
    steps:
      - name: Clone platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 4

      - name: Setup PHP
        uses: shivammathur/setup-php@6c489b2fc701c5f9ed70ccebe221b567bee578c0 # 2
        with:
          php-version: "8.2"

      - name: Install Composer
        run: |
          composer install --no-interaction --no-scripts
          curl --location --output local-php-security-checker https://github.com/fabpot/local-php-security-checker/releases/download/v1.0.0/local-php-security-checker_1.0.0_linux_amd64
          echo 'e5b12488ca78bc07c149e9352278bf10667b88a8461caac10154f9a6f5476369  local-php-security-checker' > local-php-security-checker.sha256
          sha256sum --check local-php-security-checker.sha256
          chmod +x local-php-security-checker

      - name: Run on platform
        run: ./local-php-security-checker
  code-ql:
    name: Analyze
    if: ${{ github.repository == 'shopware/shopware' }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        language: [ "javascript" ]
    permissions:
        contents: read
        security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 4
        with:
          fetch-depth: 2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e907b5e64f6b83e7804b09294d44122997950d6 #  v4.32.3

        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@9e907b5e64f6b83e7804b09294d44122997950d6 #  v4.32.3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e907b5e64f6b83e7804b09294d44122997950d6 #  v4.32.3

  tested-update-versions:
    name: tested-versions
    runs-on: ubuntu-24.04
    outputs:
      first-version: ${{ steps.versions.outputs.first-version }}
      latest-version: ${{ steps.versions.outputs.latest-version }}
      lts-first-version: ${{ steps.versions.outputs.lts-first-version }}
      lts-latest-version: ${{ steps.versions.outputs.lts-latest-version }}
    steps:
      - name: Generate versions
        id: versions
        uses: shopware/github-actions/versions@main
        with:
          github-token: ${{ github.token }}

  acceptance-update:
    needs: tested-update-versions
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        update:
          - version: ${{ needs.tested-update-versions.outputs.lts-latest-version }}
            type: lts-latest
          - version: ${{ needs.tested-update-versions.outputs.first-version }}
            type: first
          - version: ${{ needs.tested-update-versions.outputs.latest-version }}
            type: latest
    env:
      SHOPWARE_HTTP_CACHE_ENABLED: 0
      BLUE_GREEN_DEPLOYMENT: 1
      SHOPWARE_DISABLE_UPDATE_CHECK: "0"
      SHOPWARE_UPDATE_FROM: ${{ matrix.update.version }}
      SW_RECOVERY_NEXT_VERSION: "6.7.9999999.9999999"
      SW_RECOVERY_NEXT_BRANCH: "6.7.9999999.9999999"
      SW_RECOVERY_REPOSITORY: '{"type": "path", "url": "${{ github.workspace }}/new-shopware/src/*", "options": { "symlink": true } }'
      S3_BUCKET: "shopware-ci-playwright-traces"
      REPORT_PREFIX: "playwright-reports"
      DO_NOT_TRACK: 1
    steps:
      - name: Create shopware dirs
        run: mkdir -p old-shopware new-shopware
      - name: Setup new Shopware
        uses: shopware/setup-shopware@main
        env:
          COMPOSER_ROOT_VERSION: 6.7.9999999-dev
        with:
          npm-version: 11.8.0
          shopware-version: ${{ github.ref }}
          shopware-repository: ${{ github.repository }}
          install-admin: true
          env: dev
          path: new-shopware

      - name: Cache Storefront npm packages
        uses: actions/cache@v5
        with:
          # ~/.npm is npm's tarball cache; `npm ci` wipes node_modules but reuses this
          # offline (see prefer-offline below), which keeps the install off the network.
          path: |
            new-shopware/src/Storefront/Resources/app/storefront/node_modules
            ~/.npm
          key: ${{ runner.os }}-storefront-${{ hashFiles('new-shopware/src/Storefront/Resources/app/storefront/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-storefront-

      # This job checks the repo out into new-shopware/, so the composite action is
      # referenced at its checked-out subpath (local ./ actions resolve from the workspace root).
      - name: Install storefront dependencies
        uses: ./new-shopware/.github/actions/npm-ci-retry
        with:
          working-directory: new-shopware
          command: composer run npm:storefront ci

      - name: Build new shopware
        working-directory: new-shopware
        run: |
          composer run npm:storefront run production
          (cd src/Storefront/Resources/app/storefront && node copy-to-vendor.js)

          composer -d src/Core config version ${SW_RECOVERY_NEXT_VERSION}
          composer -d src/Administration config version ${SW_RECOVERY_NEXT_VERSION}
          composer -d src/Storefront config version ${SW_RECOVERY_NEXT_VERSION}
          composer -d src/Elasticsearch config version ${SW_RECOVERY_NEXT_VERSION}

      - name: Checkout template
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 4
        with:
          repository: shopware/production
          path: old-shopware

      - name: Configure project root
        run: |
          echo "PROJECT_ROOT=${{ github.workspace }}/old-shopware" >> "$GITHUB_ENV"

      - name: Require shopware
        working-directory: old-shopware
        run: |
          # Note: We expect to see vulnerabilities in the older versions we're using here.
          jq '.config.audit = { "block-insecure": false }' composer.json > composer.json.new
          mv composer.json.new composer.json

          composer require shopware/core:${{ matrix.update.version }}

      - name: Install
        working-directory: old-shopware
        run: |
          sed -i -e "s/shopware.store.frw: '1'/shopware.store.frw: '0'"/ config/services.yaml
          bin/console system:install --basic-setup --drop-database --create-database

      - name: Download latest WebInstaller
        run: |
          curl -L https://github.com/shopware/web-installer/releases/latest/download/shopware-installer.phar.php -o old-shopware/public/shopware-installer.phar.php

      - name: Start web server
        working-directory: old-shopware
        run: symfony server:start -d

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # 4
        with:
          node-version: 22
      - name: Install npm
        run: npm install -g npm@11.8.0

      # ~/.npm is cached earlier in this job, so prefer-offline reuses tarballs.
      # Referenced at the new-shopware/ subpath where the repo is checked out.
      - name: Install dependencies
        uses: ./new-shopware/.github/actions/npm-ci-retry
        with:
          working-directory: new-shopware/tests/acceptance

      - name: Refresh Package List
        run: sudo apt-get update --allow-releaseinfo-change

      - name: Install Playwright Browsers
        working-directory: new-shopware/tests/acceptance
        run: npx playwright install --with-deps chromium
      - name: Run update tests with reporting
        if: ${{ (inputs.nightly == 'true' && github.event_name == 'schedule') && 'true' || '' }}
        working-directory: new-shopware/tests/acceptance
        run: npx pwc --project-id ${{ secrets.CURRENTS_PROJECT_ID }} --key ${{ secrets.CURRENTS_RECORD_KEY }} -- --project=Update --trace=on
      - name: Run update tests
        if: ${{ (inputs.nightly != 'true' || github.event_name != 'schedule') && 'true' || '' }}
        working-directory: new-shopware/tests/acceptance
        run: npx playwright test --project=Update --trace=on

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # 6.0.0
        if: always()
        with:
          name: playwright-report-update-${{ matrix.update.type }}-${{ matrix.update.version }}
          path: new-shopware/tests/acceptance/test-results/
          retention-days: 3

      - name: Check if this run should attempt AWS operations
        id: check-aws-allowed
        if: ${{ github.repository_owner == 'shopware' &&
              (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        shell: bash
        run: |
              if [ -z "${{ secrets.PLAYWRIGHT_TRACES_UPLOAD_ROLE_ARN }}" ]; then
                echo "has_role_arn=false" >> "$GITHUB_OUTPUT"
                echo "Secret PLAYWRIGHT_TRACES_UPLOAD_ROLE_ARN is empty or unavailable (likely a fork)." >&2
              else
                echo "has_role_arn=true" >> "$GITHUB_OUTPUT"
              fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ steps.check-aws-allowed.outputs.has_role_arn == 'true' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
           aws-region: eu-central-1
           role-session-name: gha-playwright-${{ github.run_id }}-${{ github.run_attempt }}
           role-to-assume: ${{ secrets.PLAYWRIGHT_TRACES_UPLOAD_ROLE_ARN }}

      - name: Upload Playwright HTML report to S3
        working-directory: new-shopware/tests/acceptance
        if: ${{ steps.check-aws-allowed.outputs.has_role_arn == 'true' }}
        shell: bash
        run: |
            set -euo pipefail
            RANDOM_STR=$(openssl rand -hex 6)

            # build the destination prefix and export it for subsequent steps
            REPORT_DEST="${REPORT_PREFIX}/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${RANDOM_STR}"

            if [ ! -f "playwright-report/index.html" ]; then
            echo "No Playwright report found, skipping upload."
            exit 0
            fi

            aws s3 cp "playwright-report" "s3://${S3_BUCKET}/${REPORT_DEST}/" --recursive
            echo "REPORT_DEST=${REPORT_DEST}" >> "$GITHUB_ENV"
            echo "Uploaded to s3://${S3_BUCKET}/${REPORT_DEST}/"

      - name: Publish S3 Static Website URL
        if: ${{ steps.check-aws-allowed.outputs.has_role_arn == 'true' }}
        shell: bash
        run: |
            set -euo pipefail

            if [ -z "${REPORT_DEST:-}" ]; then
            echo "REPORT_DEST not set (upload skipped or failed); skipping publish." >&2
            exit 0
            fi

            if ! aws s3 ls "s3://${S3_BUCKET}/${REPORT_DEST}/index.html" >/dev/null 2>&1; then
            echo "Index file not found ... skipping publish." >&2
            exit 0
            fi

            DOMAIN="${{ vars.PLAYWRIGHT_TRACES_DOMAIN }}"
            URL="https://${DOMAIN}/${REPORT_DEST}/index.html"
            echo "${URL}"

            echo "### Playwright HTML Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- ${URL}" >> "$GITHUB_STEP_SUMMARY"

  blue-green-67-68:
    name: "PHP blue green 6.7 -> 6.8 -> 6.7"
    runs-on: ubuntu-24.04
    env:
      APP_ENV: test
      APP_URL: http://localhost:8000
      APP_SECRET: def00000bb5acb32b54ff8ee130270586eec0e878f7337dc7a837acc31d3ff00f93a56b595448b4b29664847dd51991b3314ff65aeeeb761a133b0ec0e070433bff08e48
      OPENSEARCH_URL: 127.0.0.1:9200
      ADMIN_OPENSEARCH_URL: 127.0.0.1:9200
      BLUE_GREEN_DEPLOYMENT: 1
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      DO_NOT_TRACK: 1

    services:
      elasticsearch:
        image: "opensearchproject/opensearch:3"
        env:
          discovery.type: single-node
          plugins.security.disabled: "true"
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: "yourStrongPassword123!"
        ports:
          - "9200:9200"

    steps:
      - name: Setup previous major version
        uses: shopware/setup-shopware@main
        with:
          install: "false"
          shopware-version: ${{ github.ref }}
          shopware-repository: ${{ github.repository }}

      - name: Start Webserver
        run: symfony server:start -d

      - name: Install Shopware in previous major version on test DB
        if: inputs.nightly == 'true'
        run: composer init:testdb

      - name: Run next major migrations on test DB
        if: inputs.nightly == 'true'
        run: DATABASE_URL="mysql://root@127.0.0.1:3306/shopware_test" bin/console database:migrate --all core.V6_8

      - name: Run integration tests
        if: inputs.nightly == 'true'
        run: php -d memory_limit=-1 vendor/bin/phpunit --testsuite "integration" --stop-on-error --stop-on-failure

      - name: Install Shopware in previous major version
        if: inputs.nightly != 'true'
        run: bin/console system:install --basic-setup --create-database --skip-assets-install

      - name: Run next major migrations
        if: inputs.nightly != 'true'
        run: bin/console database:migrate --all core.V6_8

      - name: Run blue-green check
        if: inputs.nightly != 'true'
        run: php .github/bin/blue-green-check.php

  blue-green-66-67:
    name: "PHP blue green 6.6 -> 6.7 -> 6.6"
    runs-on: ubuntu-24.04
    env:
      APP_ENV: test
      APP_URL: http://localhost:8000
      APP_SECRET: def00000bb5acb32b54ff8ee130270586eec0e878f7337dc7a837acc31d3ff00f93a56b595448b4b29664847dd51991b3314ff65aeeeb761a133b0ec0e070433bff08e48
      OPENSEARCH_URL: 127.0.0.1:9200
