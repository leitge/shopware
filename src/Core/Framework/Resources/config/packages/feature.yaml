shopware:
  feature:
    flags:
      - name: v6.5.0.0
        default: true
        major: true
        toggleable: false
      - name: v6.6.0.0
        default: true
        major: true
        toggleable: false
      - name: v6.7.0.0
        default: true
        major: true
        toggleable: false
      - name: v6.8.0.0
        default: false
        major: true
        toggleable: false
      - name: DISABLE_VUE_COMPAT
        default: true
        major: true
        toggleable: false
      - name: ACCESSIBILITY_TWEAKS
        default: true
        major: true
        toggleable: true
        description: "Accessibility tweaks (highly recommended)\nAccessibility improvements can alter the HTML and CSS structure of the template.\nThe accessibility improvements will be standard as of v6.7.0"
      - name: TELEMETRY_METRICS
        default: false
        major: false
        toggleable: true
        description: "Experimental! Enable OpenTelemetry metrics"
      - name: FLOW_EXECUTION_AFTER_BUSINESS_PROCESS
        default: false
        major: true
        toggleable: true
        description: "Execute flows after the main unit of work has concluded. Will become the default for next major 6.8"
      - name: PERFORMANCE_TWEAKS
        default: false
        major: true
        toggleable: true
        description: "Experimental! Contains Performance Tweaks for future changes"
      - name: TWIG_COMPILE_TIME_OPTIMIZATION
        default: false
        major: false
        toggleable: true
        description: "Experimental! Optimize static Twig feature flag calls at compile time"
      - name: ENABLE_OPENSEARCH_FOR_ADMIN_API
        default: false
        major: false
        toggleable: true
        description: "Experimental! Route supported Admin API entity searches through OpenSearch"
      - name: CACHE_CONTEXT_HASH_RULES_OPTIMIZATION
        default: false
        major: false
        toggleable: true
        description: "Deprecated! Not used anymore, use the `CACHE_REWORK` feature flag instead."
      - name: CACHE_REWORK
        default: false
        major: false
        toggleable: true
        description: "Experimental! Enable new caching, includes following breaking changes: Only include rule ids which are relevant for different content in the HTTP cache context key; Remove cache states and cache pages for logged in customers or when the cart is filled by default; Enable caching for Store-API."
      - name: DEFERRED_CART_ERRORS
        default: false
        major: false
        toggleable: true
        description: "Defers cart errors that happen during SalesChannelContext creation\nThis feature will be standard as of v6.8.0"
      - name: REPEATED_PAYMENT_FINALIZE
        default: false
        major: true
        toggleable: true
        description: "This allows repeated calls to the /payment/finalize-transaction endpoint with the same token without throwing a 'token expired' exception."
      - name: PERMANENT_AUTOMATIC_PROMOTIONS
        default: false
        major: true
        toggleable: true
        description: "Automatic promotions cannot be removed anymore and are therefore no longer tracked as blocked after removal."
      - name: METEOR_TEXT_EDITOR
        default: false
        major: false
        toggleable: true
        description: "Enables the Meteor text editor in the administration."
      - name: MCP_SERVER
        default: false
        major: false
        toggleable: true
        description: "Experimental! Enable MCP (Model Context Protocol) server for AI tool integration"
      - name: JSON_LD_DATA
        default: false
        major: true
        toggleable: true
        description: "Replace inline microdata (itemscope/itemprop) with JSON-LD structured data in the Storefront. When enabled, legacy microdata attributes are removed and a <script type=\"application/ld+json\"> block is injected into the <head> instead."
      - name: BREADCRUMB_REWORK
        default: false
        major: true
        toggleable: true
        description: "Experimental! Enables the new breadcrumb loading and adds the possibility to build the product breadcrumb using the referrer category."
      - name: WEBHOOKS_REWORK
        default: false
        major: true
        toggleable: true
        description: "Experimental! Enable outbox-owned retry scheduling for webhooks instead of Messenger retries."
